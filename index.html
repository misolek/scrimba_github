<html>
  <head>
    <link
      href="https://fonts.cdnfonts.com/css/cursed-timer-ulil"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <div>
        <h3>HOME</h3>
        <div class="score" id="home-score">0</div>
        <div class="buttons">
          <button id="home-add-one" class="button">+1</button>
          <button id="home-add-two" class="button">+2</button>
          <button id="home-add-three" class="button">+3</button>
        </div>
      </div>
      <div>
        <h3>AWAY</h3>
        <div class="score" id="guest-score">0</div>
        <div class="buttons">
          <button id="guest-add-one" class="button">+1</button>
          <button id="guest-add-two" class="button">+2</button>
          <button id="guest-add-three" class="button">+3</button>
        </div>
      </div>
    </div>
    <div class="new-game">
      <button id="new-game-button" class="button">New Game</button>
    </div>
    <script src="index.js"></script>
  </body>
</html>
